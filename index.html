<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>เลขาส่วนตัว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:#0f0f0f;color:#111;overscroll-behavior:none;height:100dvh;display:flex;flex-direction:column}
input,textarea,button{font-family:'Sarabun',sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;width:100%;position:relative}
#header{background:#0f0f0f;padding:14px 18px 10px;flex-shrink:0}
#header h1{color:#fff;font-size:18px;font-weight:800;margin-bottom:6px}
.hrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.hstat{font-size:11px;color:#666}
.hstat.money{color:#f59e0b;font-weight:700}
.sync-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px}
#fab{position:absolute;top:14px;right:18px;width:46px;height:46px;background:#fff;border:none;border-radius:23px;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}
#pipe{background:#0f0f0f;border-bottom:1px solid #1a1a1a;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#pipe::-webkit-scrollbar{display:none}
#pipe-inner{display:flex;gap:6px;padding:10px 18px;align-items:center;white-space:nowrap}
.pp{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:800;border:none;cursor:pointer}
#content{flex:1;overflow-y:auto;background:#f0f0eb;padding:14px;padding-bottom:90px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #ebebeb;display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;border:none;background:none;cursor:pointer;position:relative}
.ni{font-size:22px;line-height:1}
.nl{font-size:9px;font-weight:600}
.nd{position:absolute;top:6px;right:25%;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-size:9px;color:#fff;font-weight:800}
.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ctitle{font-size:16px;font-weight:800;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.prog{height:5px;background:#eee;border-radius:99px;overflow:hidden;margin-top:4px}
.progf{height:100%;border-radius:99px}
.drow{display:flex;justify-content:space-between;margin:8px 0 4px}
.drow span{font-size:11px;color:#aaa}
.drow .dl{font-size:11px;font-weight:800}
.crow{display:flex;gap:10px;margin-bottom:12px}
.adv{width:100%;padding:14px;border:none;border-radius:13px;color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.cphoto{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-bottom:12px;display:block}
.delb{width:36px;height:36px;background:#f5f5f0;border:none;border-radius:10px;font-size:16px;color:#ccc;cursor:pointer;flex-shrink:0}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center}
.eico{font-size:52px;margin-bottom:12px}
.etitle{font-size:17px;font-weight:800;color:#555;margin-bottom:6px}
.esub{font-size:13px;color:#bbb;line-height:1.7}
.ibox{display:flex;gap:12px;padding:14px;border-radius:14px;border:2px solid;margin-bottom:14px}
.evc{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:center;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.evc.today{border-color:#8b5cf6}
.dayb{width:50px;border-radius:13px;padding:8px 4px;text-align:center;flex-shrink:0}
.dayn{font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.daym{font-size:10px;margin-top:2px}
.evtitle{font-size:15px;font-weight:800}
.evsub{font-size:12px;color:#888;margin-top:3px}
.statb{background:#111;border-radius:18px;padding:20px;margin-bottom:14px;display:flex}
.stati{flex:1}
.stati+.stati{border-left:1px solid #2a2a2a;padding-left:14px}
.statl{font-size:10px;color:#555;margin-bottom:4px}
.statv{font-size:19px;font-weight:800}
.payb{width:100%;padding:14px;border:none;border-radius:13px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.sh{background:#fff;border-radius:24px 24px 0 0;padding:18px 20px 0;max-height:93dvh;display:flex;flex-direction:column}
.shh{width:40px;height:5px;background:#e0e0e0;border-radius:99px;margin:0 auto 4px}
.sht{font-size:18px;font-weight:800;padding:10px 0;color:#111}
.shb{overflow-y:auto;padding-bottom:30px}
.dov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.dlg{background:#fff;border-radius:22px;padding:24px;width:100%;max-width:360px}
.dtitle{font-size:18px;font-weight:800;margin-bottom:8px}
.dhint{background:#f5f5f0;border-radius:12px;padding:12px;margin-bottom:18px;font-size:13px;color:#555}
.lbl{font-size:12px;font-weight:700;color:#999;margin-bottom:7px;display:block}
.slbl{font-size:11px;color:#bbb;margin-bottom:5px;display:block}
.inp{width:100%;background:#f5f5f0;border:2px solid transparent;border-radius:12px;padding:13px;font-size:15px;color:#111;outline:none;margin-bottom:12px}
.inp:focus{border-color:#ddd}
textarea.inp{height:76px;resize:none}
.r2{display:flex;gap:10px}
.r2>div{flex:1}
.btn{width:100%;padding:14px;border:none;border-radius:13px;background:#111;color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.btn:disabled{background:#ccc}
.btng{background:#f0f0eb;color:#555}
.btr{display:flex;gap:10px}
.btr .btn{flex:1}
.prib{display:flex;gap:8px;margin-bottom:14px}
.pribtn{flex:1;padding:11px;border:none;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer}
.togr{display:flex;gap:10px;margin-bottom:14px}
.tog{flex:1;padding:14px;border:none;border-radius:13px;font-size:13px;font-weight:800;cursor:pointer}
.mbox{display:flex;justify-content:space-between;align-items:center;border:2px solid;border-radius:14px;padding:14px;margin-bottom:14px}
.photob{width:100%;padding:14px;background:#fafafa;border:2px dashed #e8e8e8;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:12px;font-size:14px;font-weight:700;color:#666;border-style:dashed}
.phprev{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-bottom:12px;display:block}
.phwrap{position:relative;margin-bottom:12px}
.phdel{position:absolute;top:8px;right:8px;width:30px;height:30px;background:rgba(0,0,0,.6);border:none;border-radius:99px;color:#fff;font-size:14px;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>📋 เลขาส่วนตัว</h1>
    <div class="hrow" id="hstats"></div>
    <button id="fab" onclick="onFab()">＋</button>
  </div>
  <div id="pipe"><div id="pipe-inner"></div></div>
  <div id="content"></div>
  <nav id="nav"></nav>
</div>

<!-- Add Task -->
<div class="ov hidden" id="ov-task" onclick="closeOv('ov-task',event)">
  <div class="sh">
    <div class="shh"></div>
    <div class="sht">➕ เพิ่มงานใหม่</div>
    <div class="shb">
      <label class="lbl">ชื่องาน *</label>
      <input class="inp" id="t-text" placeholder="เช่น รีวิวครีมบำรุงผิว">
      <label class="lbl">ความเร่งด่วน</label>
      <div class="prib">
        <button class="pribtn" data-p="high" onclick="setPri('high')" style="background:#f0f0eb;color:#555">🔴 ด่วน</button>
        <button class="pribtn" data-p="medium" onclick="setPri('medium')" style="background:#111;color:#fff">🟡 ปกติ</button>
        <button class="pribtn" data-p="low" onclick="setPri('low')" style="background:#f0f0eb;color:#555">🟢 ไม่เร่ง</button>
      </div>
      <label class="lbl">ราคางาน (ถ้ามี)</label>
      <input class="inp" id="t-price" placeholder="0" type="number" inputmode="numeric">
      <label class="lbl">ช่วงเวลา</label>
      <div class="r2">
        <div><span class="slbl">วันเริ่ม</span><input class="inp" id="t-start" type="date"></div>
        <div><span class="slbl">ส่งดราฟภายใน</span><input class="inp" id="t-end" type="date"></div>
      </div>
      <label class="lbl">รูปภาพ (ถ้ามี)</label>
      <button class="photob" onclick="document.getElementById('fi-task').click()">📷 ถ่าย / เลือกรูป</button>
      <input type="file" id="fi-task" accept="image/*" class="hidden" onchange="onPhoto(this)">
      <div id="ph-wrap" class="hidden">
        <div class="phwrap"><img id="ph-prev" class="phprev"><button class="phdel" onclick="clearPhoto()">✕</button></div>
      </div>
      <button class="btn" onclick="addTask()">+ บันทึกงาน</button>
    </div>
  </div>
</div>

<!-- Add Event -->
<div class="ov hidden" id="ov-evt" onclick="closeOv('ov-evt',event)">
  <div class="sh">
    <div class="shh"></div>
    <div class="sht">📅 เพิ่มนัดหมาย</div>
    <div class="shb">
      <label class="lbl">ชื่อนัดหมาย *</label>
      <input class="inp" id="e-title" placeholder="เช่น ส่งงาน, ประชุม">
      <div class="r2">
        <div><label class="lbl">วันที่ *</label><input class="inp" id="e-date" type="date"></div>
        <div><label class="lbl">เวลา</label><input class="inp" id="e-time" type="time"></div>
      </div>
      <label class="lbl">หมายเหตุ</label>
      <input class="inp" id="e-note" placeholder="สถานที่, รายละเอียด">
      <label class="lbl">มูลค่างาน (ถ้ามี)</label>
      <input class="inp" id="e-price" placeholder="0" type="number" inputmode="numeric">
      <button class="btn" onclick="addEvt()">+ บันทึกนัดหมาย</button>
    </div>
  </div>
</div>

<!-- Event Detail -->
<div class="ov hidden" id="ov-edet" onclick="closeEvDet(event)">
  <div class="sh">
    <div class="shh"></div>
    <div class="sht" id="edet-title"></div>
    <div class="shb" id="edet-body"></div>
  </div>
</div>

<!-- Schedule Dialog -->
<div class="dov hidden" id="dov-sched" onclick="closeDov('dov-sched',event)">
  <div class="dlg" onclick="event.stopPropagation()">
    <div class="dtitle">📅 นัดวันโพส</div>
    <div class="dhint" id="sched-name"></div>
    <label class="lbl">วันที่โพส *</label>
    <input class="inp" id="sched-d" type="date">
    <label class="lbl">เวลา (ถ้ามี)</label>
    <input class="inp" id="sched-t" type="time">
    <div class="btr">
      <button class="btn btng" onclick="closeDov('dov-sched')">ยกเลิก</button>
      <button class="btn" style="flex:2" onclick="confirmSched()">✅ ยืนยัน</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyDp3rlayAmk4l_8DUol98BPQBQPxLJbtTA",
  authDomain:"secretary-c3acf.firebaseapp.com",
  projectId:"secretary-c3acf",
  storageBucket:"secretary-c3acf.firebasestorage.app",
  messagingSenderId:"725117111513",
  appId:"1:725117111513:web:6057958c12b55bf96542c8"
});
const db = getFirestore(app);
const UID = 'superjeffz-main';

let fromCloud=false, saveTimer=null;
window.tasks=[]; window.evts=[];

setSyncBadge('loading');
onSnapshot(doc(db,'users',UID,'data','main'), snap=>{
  if(snap.exists()){
    fromCloud=true;
    window.tasks=snap.data().tasks||[];
    window.evts=snap.data().evts||[];
    render();
  }
  setSyncBadge('synced');
});

window.scheduleSave=function(){
  setSyncBadge('syncing');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await setDoc(doc(db,'users',UID,'data','main'),
        {tasks:window.tasks,evts:window.evts,updatedAt:serverTimestamp()},{merge:true});
      setSyncBadge('synced');
    }catch(e){setSyncBadge('offline');}
  },800);
};

function setSyncBadge(s){
  const m={loading:['#f0f0eb','#888','🔄 กำลังโหลด'],syncing:['#fef3c7','#92400e','⏳ sync...'],synced:['#f0fdf4','#16a34a','☁️ sync แล้ว'],offline:['#fff5f5','#ef4444','❌ ออฟไลน์']};
  const [bg,c,l]=m[s]||m.loading;
  const el=document.getElementById('sbadge');
  if(el){el.style.background=bg;el.style.color=c;el.textContent=l;}
}
window.setSyncBadge=setSyncBadge;
</script>

<script>
const PC={high:'#ef4444',medium:'#f59e0b',low:'#10b981'};
const PL={high:'🔴 ด่วน',medium:'🟡 ปกติ',low:'🟢 ไม่เร่ง'};
let curTab=0, selPri='medium', schedId=null, detId=null, photoB64=null;

const pad=n=>String(n).padStart(2,'0');
const toISO=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=()=>toISO(new Date());
const plus7=iso=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+7);return toISO(d);};
const fS=d=>{if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'});};
const fL=d=>{if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});};
const fP=p=>{const n=parseFloat(p);return(!p||isNaN(n))?'':n.toLocaleString('th-TH')+' ฿';};

function render(){
  if(!window.tasks) return;
  const T=window.tasks, E=window.evts;
  const todos=T.filter(t=>t.stage==='todo');
  const drafts=T.filter(t=>t.stage==='draft');
  const posts=T.filter(t=>t.stage==='post');
  const up=E.filter(e=>!e.done).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const dn=E.filter(e=>e.done).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totA=dn.reduce((s,e)=>s+(parseFloat(e.price)||0),0);
  const totP=dn.filter(e=>e.paid).reduce((s,e)=>s+(parseFloat(e.price)||0),0);
  const totW=totA-totP;

  document.getElementById('hstats').innerHTML=
    `<span class="sync-badge" id="sbadge" style="background:#f0f0eb;color:#888">🔄</span>`+
    (todos.length?`<span class="hstat">📋 ${todos.length}</span>`:'')+
    (drafts.length?`<span class="hstat">✏️ ${drafts.length}</span>`:'')+
    (posts.length?`<span class="hstat">📤 ${posts.length}</span>`:'')+
    (totW>0?`<span class="hstat money">💰 ${totW.toLocaleString('th-TH')} ฿`:'');
  if(window.setSyncBadge) window.setSyncBadge(window.setSyncBadge._last||'synced');

  const pipes=[{l:'งาน',n:todos.length,c:'#888',t:0},null,{l:'ดราฟ',n:drafts.length,c:'#f59e0b',t:1},null,{l:'รอโพส',n:posts.length,c:'#60a5fa',t:2},null,{l:'นัดหมาย',n:up.length,c:'#a78bfa',t:3}];
  document.getElementById('pipe-inner').innerHTML=pipes.map(p=>p===null?`<span style="color:#333;font-size:13px">›</span>`:`<button class="pp" style="background:${curTab===p.t?p.c:p.c+'28'};color:${curTab===p.t?'#fff':p.c}" onclick="setTab(${p.t})">${p.l}${p.n?' '+p.n:''}</button>`).join('');
  document.getElementById('pipe').style.display=curTab>=4?'none':'';

  const navs=[{i:'📋',l:'งาน',n:todos.length,c:'#6b7280'},{i:'✏️',l:'ดราฟ',n:drafts.length,c:'#f59e0b'},{i:'📤',l:'รอโพส',n:posts.length,c:'#3b82f6'},{i:'📅',l:'นัดหมาย',n:up.length,c:'#8b5cf6'},{i:'✅',l:'เสร็จแล้ว',n:dn.length,c:'#10b981'}];
  document.getElementById('nav').innerHTML=navs.map((v,i)=>`<button class="nb" onclick="setTab(${i})"><span class="ni" style="opacity:${curTab===i?1:.3}">${v.i}</span><span class="nl" style="color:${curTab===i?'#111':'#aaa'};font-weight:${curTab===i?800:500}">${v.l}</span>${v.n?`<span class="nd" style="background:${v.c}">${v.n}</span>`:''}</button>`).join('');

  let h='';
  if(curTab===0){
    if(!todos.length)h=emp('✨','ยังไม่มีงาน','กดปุ่ม ＋ ด้านบน');
    todos.forEach(t=>{h+=tcard(t,'✅ เสร็จ → ส่งดราฟ','#111','draft');});
  }else if(curTab===1){
    h+=`<div class="ibox" style="background:#fffbeb;border-color:#fde68a"><span style="font-size:20px">✏️</span><p style="font-size:13px;color:#92400e;line-height:1.7">งานที่ส่งดราฟแล้ว รอลูกค้าตรวจสอบ</p></div>`;
    if(!drafts.length)h+=emp('📨','ยังไม่มีงาน','กด "เสร็จ" ในหน้างานทั้งหมด');
    drafts.forEach(t=>{h+=tcard(t,'✅ แก้ไขเสร็จ → รอโพส','#d97706','post');});
  }else if(curTab===2){
    h+=`<div class="ibox" style="background:#eff6ff;border-color:#bfdbfe"><span style="font-size:20px">📅</span><p style="font-size:13px;color:#1e40af;line-height:1.7">กด "นัดวันโพส" เพื่อเลือกวัน-เวลา</p></div>`;
    if(!posts.length)h+=emp('📤','ยังไม่มีงาน','กด "แก้ไขเสร็จ" ในหน้าส่งดราฟ');
    posts.forEach(t=>{h+=tcard(t,'📅 นัดวันโพส → นัดหมาย','#2563eb','sched');});
  }else if(curTab===3){
    if(!up.length)h=emp('📅','ยังไม่มีนัดหมาย','กดปุ่ม ＋ ด้านบน');
    up.forEach(ev=>{h+=ecard(ev);});
  }else{
    if(dn.length)h+=`<div class="statb">${[['มูลค่ารวม',totA,'#fff'],['ได้รับ',totP,'#10b981'],['รอรับ',totW,totW>0?'#f59e0b':'#555']].map(([l,v,c],i)=>`<div class="stati"${i?' style="border-left:1px solid #2a2a2a;padding-left:14px"':''}><div class="statl">${l}</div><div class="statv" style="color:${c}">${v.toLocaleString('th-TH')} <span style="font-size:11px;font-weight:400">฿</span></div></div>`).join('')}</div>`;
    if(!dn.length)h+=emp('🏆','ยังไม่มีงานที่เสร็จ','กด "ทำเสร็จ?" ในนัดหมาย');
    dn.forEach(ev=>{h+=dcard(ev);});
  }
  document.getElementById('content').innerHTML=h;
  document.getElementById('fab').style.display=curTab>=4?'none':'';
  if(window.setSyncBadge) window.setSyncBadge('synced');
}

function emp(i,t,s){return`<div class="empty"><div class="eico">${i}</div><div class="etitle">${t}</div><div class="esub">${s}</div></div>`;}

function tcard(t,bl,bc,ns){
  const now=new Date();now.setHours(0,0,0,0);
  const e=t.endDate?new Date(t.endDate+'T00:00:00'):null;
  const s=t.startDate?new Date(t.startDate+'T00:00:00'):null;
  const dl=e?Math.ceil((e-now)/86400000):null;
  const ov=dl!==null&&dl<0;
  const dc=ov?'#ef4444':dl<=2?'#f59e0b':'#10b981';
  let pr=0;
  if(s&&e&&e>s)pr=Math.round(Math.min(Math.max((now-s)/(e-s),0),1)*100);
  const act=ns==='sched'?`onclick="openSched('${t.id}')"`:`onclick="adv('${t.id}','${ns}')"`;
  return`<div class="card">
    ${t.photo?`<img class="cphoto" src="${t.photo}">`:''}
    <div class="crow">
      <div style="flex:1">
        <div class="ctitle">${esc(t.text)}</div>
        <div class="tags">
          <span class="tag" style="background:${PC[t.priority]}22;color:${PC[t.priority]}">${PL[t.priority]}</span>
          ${fP(t.price)?`<span class="tag" style="background:#f0f0eb;color:#555">💼 ${fP(t.price)}</span>`:''}
        </div>
        ${(s||e)?`<div class="drow"><span>${s?fS(t.startDate):''} ${s&&e?'→':''} ${e?fS(t.endDate):''}</span>${dl!==null?`<span class="dl" style="color:${dc}">${ov?`เกิน ${Math.abs(dl)} วัน`:dl===0?'วันนี้!':'อีก '+dl+' วัน'}</span>`:''}</div>${s&&e?`<div class="prog"><div class="progf" style="width:${pr}%;background:${ov?'#ef4444':dl<=2?'#f59e0b':'#111'}"></div></div>`:'`'}`:''}
      </div>
      <button class="delb" onclick="delT('${t.id}')">✕</button>
    </div>
    <button class="adv" style="background:${bc}" ${act}>${bl}</button>
  </div>`;
}

function ecard(ev){
  const it=new Date().toDateString()===new Date(ev.date+'T00:00:00').toDateString();
  const d=new Date(ev.date+'T00:00:00');
  return`<div class="evc ${it?'today':''}" onclick="openEdet('${ev.id}')">
    <div class="dayb" style="background:${it?'#8b5cf6':'#111'}">
      <div class="dayn">${d.getDate()}</div>
      <div class="daym" style="color:${it?'#e9d5ff':'#aaa'}">${d.toLocaleDateString('th-TH',{month:'short'})}</div>
    </div>
    <div style="flex:1;overflow:hidden">
      <div class="evtitle">${esc(ev.title)}</div>
      <div class="evsub">${ev.time?'🕐 '+ev.time+' น. ':''}${esc(ev.note||'')}</div>
      ${fP(ev.price)?`<span class="tag" style="background:#f0f0eb;color:#555;margin-top:6px;display:inline-flex">💼 ${fP(ev.price)}</span>`:''}
    </div>
    <span style="color:#ddd;font-size:22px">›</span>
  </div>`;
}

function dcard(ev){
  return`<div class="card" onclick="openEdet('${ev.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start${fP(ev.price)?';margin-bottom:12px':''}">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:16px">✅</span><span style="font-size:15px;font-weight:800">${esc(ev.title)}</span></div>
        <span style="font-size:12px;color:#aaa">${fL(ev.date)}${ev.time?' · '+ev.time+' น.':''}</span>
      </div>
      ${fP(ev.price)?`<div style="text-align:right;margin-left:10px"><div style="font-size:16px;font-weight:800;margin-bottom:4px">${fP(ev.price)}</div><span class="tag" style="background:${ev.paid?'#dcfce7':'#fef3c7'};color:${ev.paid?'#16a34a':'#92400e'}">${ev.paid?'💰 รับแล้ว':'⏳ รอรับ'}</span></div>`:''}
    </div>
    ${fP(ev.price)?`<button class="payb" style="background:${ev.paid?'#10b981':'#f0f0eb'};color:${ev.paid?'#fff':'#444'}" onclick="event.stopPropagation();togPaid('${ev.id}')">${ev.paid?'✅ ได้รับเงินแล้ว':'ยังไม่ได้รับ — กดเพื่อยืนยัน'}</button>`:''}
  </div>`;
}

function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setTab(t){curTab=t;render();}
function onFab(){curTab===3?showOv('ov-evt'):openAddTask();}
function showOv(id){document.getElementById(id).classList.remove('hidden');}
function closeOv(id,e){if(!e||e.target===document.getElementById(id))document.getElementById(id).classList.add('hidden');}
function closeDov(id,e){if(!e||e.target===document.getElementById(id))document.getElementById(id).classList.add('hidden');}

function openAddTask(){
  document.getElementById('t-text').value='';
  document.getElementById('t-price').value='';
  const td=today();
  document.getElementById('t-start').value=td;
  document.getElementById('t-end').value=plus7(td);
  clearPhoto(); setPri('medium');
  showOv('ov-task');
}
document.getElementById('t-start').addEventListener('change',function(){document.getElementById('t-end').value=plus7(this.value);});

function setPri(p){
  selPri=p;
  document.querySelectorAll('.pribtn').forEach(b=>{const a=b.dataset.p===p;b.style.background=a?'#111':'#f0f0eb';b.style.color=a?'#fff':'#555';});
}

function onPhoto(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const mx=800;let w=img.width,h=img.height;
      if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      photoB64=cv.toDataURL('image/jpeg',0.65);
      document.getElementById('ph-prev').src=photoB64;
      document.getElementById('ph-wrap').classList.remove('hidden');
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);input.value='';
}
function clearPhoto(){photoB64=null;document.getElementById('ph-wrap').classList.add('hidden');document.getElementById('ph-prev').src='';}

function addTask(){
  const text=document.getElementById('t-text').value.trim();
  if(!text){alert('กรุณาใส่ชื่องาน');return;}
  if(!Array.isArray(window.tasks)) window.tasks=[];
  window.tasks.push({id:Date.now()+'',stage:'todo',text,priority:selPri||'medium',
    startDate:document.getElementById('t-start').value||today(),
    endDate:document.getElementById('t-end').value||plus7(today()),
    price:document.getElementById('t-price').value||'',
    photo:photoB64||null});
  window.scheduleSave&&window.scheduleSave();
  closeOv('ov-task');render();
}
function adv(id,stage){
  window.tasks=window.tasks.map(t=>t.id===id?{...t,stage}:t);
  window.scheduleSave&&window.scheduleSave();render();
}
function delT(id){
  window.tasks=window.tasks.filter(t=>t.id!==id);
  window.scheduleSave&&window.scheduleSave();render();
}

function openSched(id){
  schedId=id;
  const t=window.tasks.find(x=>x.id===id);
  document.getElementById('sched-name').textContent=t?.text||'';
  document.getElementById('sched-d').value=today();
  document.getElementById('sched-t').value='';
  showOv('dov-sched');
}
function confirmSched(){
  const d=document.getElementById('sched-d').value;if(!d)return;
  const t=window.tasks.find(x=>x.id===schedId);
  if(t){
    window.evts.push({id:Date.now()+'',title:t.text,date:d,
      time:document.getElementById('sched-t').value,
      note:'📤 โพสงาน',price:t.price||'',done:false,paid:false});
    window.tasks=window.tasks.filter(x=>x.id!==schedId);
    window.scheduleSave&&window.scheduleSave();
  }
  closeDov('dov-sched');curTab=3;render();
}

function addEvt(){
  const title=document.getElementById('e-title').value.trim();
  const date=document.getElementById('e-date').value;
  if(!title||!date)return;
  window.evts.push({id:Date.now()+'',title,date,
    time:document.getElementById('e-time').value,
    note:document.getElementById('e-note').value,
    price:document.getElementById('e-price').value,
    done:false,paid:false});
  window.scheduleSave&&window.scheduleSave();
  ['e-title','e-note','e-price'].forEach(i=>document.getElementById(i).value='');
  closeOv('ov-evt');render();
}

function openEdet(id){
  detId=id;
  const ev=window.evts.find(e=>e.id===id);if(!ev)return;
  document.getElementById('edet-title').textContent=ev.title;
  renderEdet(ev);showOv('ov-edet');
}
function renderEdet(ev){
  const pn=parseFloat(ev.price)||0;
  document.getElementById('edet-body').innerHTML=`
    <p style="font-size:13px;color:#999;margin-bottom:16px">${fL(ev.date)}${ev.time?' · '+ev.time+' น.':''}</p>
    ${ev.photo?`<img src="${ev.photo}" style="width:100%;height:150px;object-fit:cover;border-radius:12px;margin-bottom:14px">`:''}
    <label class="lbl">หมายเหตุ</label>
    <textarea class="inp" oninput="updEv('note',this.value)">${esc(ev.note||'')}</textarea>
    <label class="lbl">มูลค่างาน (฿)</label>
    <input class="inp" type="number" inputmode="numeric" value="${ev.price||''}" oninput="updEv('price',this.value)" placeholder="0">
    <div class="togr">
      <button class="tog" style="background:${ev.done?'#10b981':'#f0f0eb'};color:${ev.done?'#fff':'#444'}" onclick="togDone('${ev.id}')">${ev.done?'✅ เสร็จแล้ว':'⬜ ทำเสร็จ?'}</button>
      <button class="tog" style="background:${ev.paid?'#3b82f6':'#f0f0eb'};color:${ev.paid?'#fff':'#444'}" onclick="togPaid('${ev.id}')">${ev.paid?'💰 รับแล้ว':'💳 ได้เงิน?'}</button>
    </div>
    ${pn>0?`<div class="mbox" style="background:${ev.paid?'#f0fdf4':'#fffbeb'};border-color:${ev.paid?'#86efac':'#fde68a'}">
      <span style="font-weight:800;color:${ev.paid?'#16a34a':'#b45309'}">${ev.paid?'✅ รับครบแล้ว':'⏳ รอรับเงิน'}</span>
      <span style="font-size:22px;font-weight:800;color:${ev.paid?'#16a34a':'#b45309'}">${fP(ev.price)}</span>
    </div>`:''}
    <button class="btn" style="background:#fff5f5;color:#ef4444;border:2px solid #fecaca" onclick="delEv('${ev.id}')">🗑 ลบนัดหมายนี้</button>
  `;
}
function closeEvDet(e){
  if(!e||e.target===document.getElementById('ov-edet')){document.getElementById('ov-edet').classList.add('hidden');render();}
}
function updEv(k,v){
  const i=window.evts.findIndex(e=>e.id===detId);
  if(i>=0){window.evts[i]={...window.evts[i],[k]:v};window.scheduleSave&&window.scheduleSave();}
}
function togDone(id){
  const i=window.evts.findIndex(e=>e.id===id);
  if(i>=0){window.evts[i]={...window.evts[i],done:!window.evts[i].done};window.scheduleSave&&window.scheduleSave();renderEdet(window.evts[i]);render();}
}
function togPaid(id){
  const i=window.evts.findIndex(e=>e.id===id);
  if(i>=0){window.evts[i]={...window.evts[i],paid:!window.evts[i].paid};window.scheduleSave&&window.scheduleSave();
    if(!document.getElementById('ov-edet').classList.contains('hidden'))renderEdet(window.evts[i]);
    render();}
}
function delEv(id){
  window.evts=window.evts.filter(e=>e.id!==id);
  window.scheduleSave&&window.scheduleSave();
  document.getElementById('ov-edet').classList.add('hidden');render();
}
render();
</script>
</body>
</html>
